# PowerSync sync config — Sync Streams (edition 3, recommended for all new apps).
# auth.parameter('key') reads JWT claims set by /api/powersync/token.
# Claims: cycle_ids (array), platoon_ids (array), squad_id (string|null)
# See: https://docs.powersync.com/sync/streams/overview

config:
  edition: 3

streams:
  activity_types:
    auto_subscribe: true
    query: >
      SELECT id, name, icon, is_active, sort_order, score_config
      FROM activity_types

  cycles:
    auto_subscribe: true
    query: >
      SELECT id, name, is_active, sort_order
      FROM cycles
      WHERE id IN auth.parameter('cycle_ids')

  companies:
    auto_subscribe: true
    query: >
      SELECT id, cycle_id, name, sort_order
      FROM companies
      WHERE cycle_id IN auth.parameter('cycle_ids')

  soldiers:
    auto_subscribe: true
    query: >
      SELECT id, cycle_id, squad_id, given_name, family_name, id_number, rank, status, profile_image, phone, emergency_phone, notes
      FROM soldiers
      WHERE cycle_id IN auth.parameter('cycle_ids')

  platoons:
    auto_subscribe: true
    query: >
      SELECT id, company_id, name, sort_order
      FROM platoons
      WHERE id IN auth.parameter('platoon_ids')

  squads:
    auto_subscribe: true
    query: >
      SELECT id, platoon_id, name, sort_order
      FROM squads
      WHERE platoon_id IN auth.parameter('platoon_ids')

  activities:
    auto_subscribe: true
    query: >
      SELECT id, platoon_id, cycle_id, activity_type_id, name, date, is_required, status
      FROM activities
      WHERE platoon_id IN auth.parameter('platoon_ids')

  activity_reports:
    auto_subscribe: true
    query: >
      SELECT id, activity_id, soldier_id, result,
             grade1, grade2, grade3, grade4, grade5, grade6, note
      FROM activity_reports
      WHERE activity_id IN (
        SELECT id FROM activities WHERE platoon_id IN auth.parameter('platoon_ids')
      )

  requests:
    auto_subscribe: true
    query: >
      SELECT id, cycle_id, soldier_id, type, status, assigned_role,
             created_by_user_id, description,
             place, departure_at, return_at, transportation,
             urgent, paramedic_date, appointment_date, appointment_place,
             appointment_type, sick_leave_days,
             special_conditions, created_at, updated_at
      FROM requests
      WHERE cycle_id IN auth.parameter('cycle_ids')

  request_actions:
    auto_subscribe: true
    query: >
      SELECT id, request_id, user_id, action, note, user_name, created_at
      FROM request_actions
      WHERE request_id IN (
        SELECT id FROM requests WHERE cycle_id IN auth.parameter('cycle_ids')
      )
