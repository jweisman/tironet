name: E2E Tests

on:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: postgresql://tironet:tironet@127.0.0.1:5434/tironet_test
      AUTH_SECRET: ci-test-secret-not-for-production-use
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: http://localhost:3001
      EMAIL_SERVER: smtp://localhost:1026
      FROM_EMAIL: "Tironet <noreply@test.com>"
      POWERSYNC_JWT_SECRET: ci-test-jwt-secret-32-bytes-long!
      PS_JWT_SECRET_B64URL: Y2ktdGVzdC1qd3Qtc2VjcmV0LTMyLWJ5dGVzLWxvbmch
      PS_JWT_AUDIENCE: http://localhost:8080
      PS_DATABASE_URL: postgresql://tironet:tironet@postgres:5432/tironet_test
      NEXT_PUBLIC_POWERSYNC_URL: http://localhost:8080
      NEXT_PUBLIC_APP_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      # Cache Docker images to avoid Docker Hub rate limits (toomanyrequests).
      # The cache key includes a hash of docker-compose.yml so it invalidates
      # when image versions change.
      - name: Cache Docker images
        id: docker-cache
        uses: actions/cache@v4
        with:
          path: /tmp/docker-images.tar
          key: docker-images-${{ hashFiles('docker-compose.yml') }}

      - name: Load cached Docker images
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-images.tar

      # Start Docker services immediately — they initialize in the background
      # while npm/Playwright/Next.js start up below.
      - name: Start Docker services
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml up -d
        env:
          PS_DATABASE_URL: postgresql://tironet:tironet@postgres:5432/tironet_test
          PS_JWT_SECRET_B64URL: Y2ktdGVzdC1qd3Qtc2VjcmV0LTMyLWJ5dGVzLWxvbmch
          PS_JWT_AUDIENCE: http://localhost:8080
          PS_MONGODB_URI: mongodb://mongo:27017/powersync_e2e

      - name: Save Docker images to cache
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: >
          docker save -o /tmp/docker-images.tar
          postgres:16-alpine
          mailhog/mailhog:latest
          mongo:7
          journeyapps/powersync-service:latest
          public.ecr.aws/upstash/qstash:latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Start Next.js dev server in background — overlaps with Docker init
      # below. Playwright config uses reuseExistingServer: true to connect
      # to this instead of launching its own.
      - name: Start dev server
        run: npm run dev -- --port 3001 &
        env:
          AUTH_TRUST_HOST: "true"

      # By now Docker services have had ~2 minutes to initialize.
      - name: Initialise MongoDB replica set
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T mongo mongosh --eval "rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongo:27017'}]})" && break
            sleep 2
          done

      - name: Wait for dev server
        run: |
          for i in $(seq 1 60); do
            curl -sf http://localhost:3001 > /dev/null 2>&1 && break
            sleep 2
          done

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
