# Development-only: local Postgres + PowerSync service
# Usage:
#   docker compose up -d
#   Then run: npm run db:migrate && npm run db:seed

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: tironet
      POSTGRES_PASSWORD: tironet
      POSTGRES_DB: tironet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Enable logical replication for PowerSync WAL streaming
    command: postgres -c wal_level=logical -c max_replication_slots=5 -c max_wal_senders=5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: tironet-mailhog
    ports:
      - "1026:1025"
      - "8026:8025"

  powersync:
    image: journeyapps/powersync-service:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      POWERSYNC_JWT_SECRET: ${POWERSYNC_JWT_SECRET}
      DATABASE_URL: postgresql://tironet:tironet@postgres:5432/tironet
    depends_on:
      - postgres

volumes:
  postgres_data:
